allowBuilds:
    "@parcel/watcher": true
    esbuild: true
    sharp: true
catalog:
    vite: npm:@voidzero-dev/vite-plus-core@latest
    vitest: npm:@voidzero-dev/vite-plus-test@latest
    vite-plus: latest
minimumReleaseAgeExclude:
    - astro@7.0.0
    - "@origami-systems/*"
overrides:
    vite: "catalog:"
    vitest: "catalog:"
peerDependencyRules:
    allowAny:
        - vite
        - vitest
    allowedVersions:
        vite: "*"
        vitest: "*"
